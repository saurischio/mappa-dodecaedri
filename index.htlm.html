// Provinces from DARE GitHub
const provincesUrl = "https://raw.githubusercontent.com/johaahlf/dare/master/provinces.geojson";
const provincesLayer = L.geoJSON(null, { style: { color: '#222', weight: 1, fillOpacity: 0.08 } });

// Utilities to switch styles
function randomPastel(seed) {
  // deterministic "pastel" from string seed
  let h = 0;
  for (let i=0;i<seed.length;i++) h = (h*31 + seed.charCodeAt(i)) >>> 0;
  const hue = h % 360;
  return `hsl(${hue}, 60%, 75%)`;
}
function setProvinceStyle(mode) {
  if (mode === 'filled') {
    provincesLayer.setStyle(function (f) {
      const nm = (f.properties && (f.properties.name || f.properties.NAME)) || 'Province';
      return { color: '#222', weight: 1, fillColor: randomPastel(nm), fillOpacity: 0.28 };
    });
  } else {
    provincesLayer.setStyle({ color: '#000', weight: 1, fillOpacity: 0.05, fillColor: '#ffffff' });
  }
}

// Load provinces and apply initial style (outline)
fetch(provincesUrl).then(r => r.json()).then(geo => {
  provincesLayer.addData(geo);
  provincesLayer.bindTooltip(function (layer) {
    const p = layer.feature.properties || {};
    return p.name || p.NAME || "Province";
  }, {sticky:true});
  setProvinceStyle('outline');
}).catch(err => console.error("Failed to load provinces:", err));

// Markers
const siteIcon = L.icon({ iconUrl: 'https://maps.google.com/mapfiles/kml/paddle/red-circle.png', iconSize: [22,22], iconAnchor: [11,11] });
const museumIcon = L.icon({ iconUrl: 'https://maps.google.com/mapfiles/kml/paddle/blu-circle.png', iconSize: [22,22], iconAnchor: [11,11] });

const siteLayer = L.geoJSON(sites, {
  pointToLayer: function (f, latlng) { return L.marker(latlng, {icon: siteIcon}); },
  onEachFeature: function (f, layer) {
    var p = f.properties || {};
    var dist = (p.distance_km != null) ? (" (" + p.distance_km + " km)") : "";
    var url = p.museum_url ? ("<br/><a href='" + p.museum_url + "' target='_blank'>Museum website</a>") : "";
    layer.bindPopup("<b>Findspot</b>: " + (p.name || "—") + "<br/><b>Nearest museum</b>: " + (p.nearest_museum || "—") + dist + "<br/>" + (p.museum_address || "") + "<br/>" + (p.museum_contact || "") + url);
  }
});

const museumLayer = L.geoJSON(museums, {
  pointToLayer: function (f, latlng) { return L.marker(latlng, {icon: museumIcon}); },
  onEachFeature: function (f, layer) {
    var p = f.properties || {};
    var url = p.url ? ("<br/><a href='" + p.url + "' target='_blank'>Museum website</a>") : "";
    layer.bindPopup("<b>Museum</b>: " + (p.name || "—") + "<br/>" + (p.address || "") + "<br/>" + (p.contact || "") + url);
  }
});

const linksLayer = L.geoJSON(links, { style: { color: '#555', weight: 2 } });

const baseMaps = { "DARE (Roman Empire)": dare, "OpenStreetMap": osm };
const overlays = {
  "Provinces (DARE)": provincesLayer,
  "Findspots (ancient toponyms)": siteLayer,
  "Museums": museumLayer,
  "Findspot → Museum": linksLayer
};
L.control.layers(baseMaps, overlays, {collapsed:false}).addTo(map);

siteLayer.addTo(map);
museumLayer.addTo(map);
provincesLayer.addTo(map);
linksLayer.addTo(map);

// Custom control to toggle province style
const styleControl = L.control({ position: 'topright' });
styleControl.onAdd = function (map) {
  const div = L.DomUtil.create('div', 'style-control');
  div.innerHTML = '<label><b>Province style</b></label>' +
                  '<select id="prov-style">' +
                  '<option value="outline" selected>Outlines only</option>' +
                  '<option value="filled">Filled colors</option>' +
                  '</select>';
  return div;
};
styleControl.addTo(map);

// Wire up the selector
document.addEventListener('change', function (ev) {
  if (ev.target && ev.target.id === 'prov-style') {
    setProvinceStyle(ev.target.value);
  }
}, false);

// Fit bounds
if (siteLayer.getLayers().length > 0) { map.fitBounds(siteLayer.getBounds().pad(0.2)); }
